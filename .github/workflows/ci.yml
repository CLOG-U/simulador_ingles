name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: simulador
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: simulador_ingles
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U simulador -d simulador_ingles"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Migraciones y seed
        env:
          DATABASE_URL: postgresql+asyncpg://simulador:test_password@localhost:5432/simulador_ingles
        run: |
          alembic upgrade head
          python -m scripts.seed_verbs

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://simulador:test_password@localhost:5432/simulador_ingles
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
