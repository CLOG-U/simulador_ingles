# Blueprint de Render: backend (Docker) + frontend (estático)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: simulador-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: simulador
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
