# Blueprint de Render: un solo Web Service (API + frontend embebido)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: simulador-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      # Con frontend embebido, el origen es la propia URL del servicio.
      - key: CORS_ORIGINS
        sync: false
